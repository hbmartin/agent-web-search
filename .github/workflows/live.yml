# Scheduled live tests against real provider APIs to detect API drift.
# Engines whose secrets are not configured are skipped automatically.
name: live
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: "11.5.2"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run test/live.test.ts --coverage.enabled=false
        env:
          LIVE_TESTS: "1"
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          CERAMIC_API_KEY: ${{ secrets.CERAMIC_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          KAGI_API_KEY: ${{ secrets.KAGI_API_KEY }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOU_API_KEY: ${{ secrets.YOU_API_KEY }}
          SEARXNG_BASE_URL: ${{ secrets.SEARXNG_BASE_URL }}
          SEARXNG_API_KEY: ${{ secrets.SEARXNG_API_KEY }}
