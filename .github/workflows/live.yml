# Scheduled live tests against real provider APIs to detect API drift.
# Engines whose secrets are not configured are skipped automatically.
name: live
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: "11.5.2"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run test/live.test.ts --coverage.enabled=false
        env:
          LIVE_TESTS: "1"
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          CERAMIC_API_KEY: ${{ secrets.CERAMIC_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          KAGI_API_KEY: ${{ secrets.KAGI_API_KEY }}
          PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOU_API_KEY: ${{ secrets.YOU_API_KEY }}
          SEARXNG_BASE_URL: ${{ secrets.SEARXNG_BASE_URL }}
          SEARXNG_API_KEY: ${{ secrets.SEARXNG_API_KEY }}
